# Change these first
owner: felipesotero # Your GitHub organization or username, where this repository lives
repo: upptime-navega # The name of this repository

sites:
  - name: Navega Home
    url: https://navega.tech
    headers:
      - "user-agent: UpptimeMonitor"
  - name: Omero Scheduler
    url: https://omero-scheduler.navega.tech
    headers:
      - "user-agent: UpptimeMonitor"
  - name: Ideal
    url: https://ideal.navega.tech
    headers:
      - "user-agent: UpptimeMonitor"
  - name: Ecco Safety
    url: https://ecco-safety.navega.tech
    headers:
      - "user-agent: UpptimeMonitor"

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  #cname: demo.upptime.js.org
  baseUrl: /upptime-navega
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: Navega - Monitoramento
  introTitle: "Monitoramento dos sites da Navega"
  introMessage: Bem-vindo ao Upptime da Navega
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

